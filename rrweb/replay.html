<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rrweb replay</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rrweb@1.1.3/dist/rrweb.min.css" />
</head>
<body>
  <div id="replayer"></div>
  <!-- Use browser UMD build (.min.js), not .umd.cjs (CommonJS = wrong MIME in browser) -->
  <script src="https://cdn.jsdelivr.net/npm/rrweb@1.1.3/dist/rrweb.min.js"></script>
  <script>
    (function() {
      var replayer = null;
      function init() {
        if (!window.__RRWEB_EVENTS__ || window.__RRWEB_EVENTS__.length === 0) return;
        var root = document.getElementById('replayer');
        if (!root) return;
        root.innerHTML = '';
        try {
          replayer = new rrweb.Replayer(window.__RRWEB_EVENTS__, {
            root: root,
            speed: 1,
            showWarning: false,
            showDebug: false,
            mouseTail: false
          });
          window.__REPLAYER_READY__ = true;
          if (typeof window.__ON_REPLAYER_READY__ === 'function') window.__ON_REPLAYER_READY__();
        } catch (e) {
          console.error('Replayer init error', e);
          window.__REPLAYER_ERROR__ = String(e);
        }
      }
      function seekTo(timeMs) {
        if (!replayer) return false;
        try {
          replayer.pause(timeMs);
          return true;
        } catch (e) {
          console.error('Seek error', e);
          return false;
        }
      }
      window.__initReplay__ = init;
      window.__seekTo__ = seekTo;
      if (window.__RRWEB_EVENTS__) init();
    })();
  </script>
</body>
</html>
