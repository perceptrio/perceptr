services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: perceptr-api
    restart: unless-stopped
    networks:
      - perceptr-network
    env_file:
      - .env
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    container_name: perceptr-caddy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      # Match official Caddy pattern: mount conf directory to /etc/caddy
      - ./caddy/local:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - perceptr-network
    depends_on:
      - api

networks:
  perceptr-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
